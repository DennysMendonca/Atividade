<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sorteador Edufor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="cabecalho">
        <h1>🎁 Sorteio de Brindes Edufor</h1>
    </header>

    <main>
        <div class="cartao">
            <h2>Participe do Sorteio</h2>
            <form id="meuForm">
                <label>Total de alunos na sala:</label>
                <input type="number" id="quantidade" placeholder="Ex: 30">
                <button type="submit">Sortear Agora!</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
